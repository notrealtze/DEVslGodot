<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEVslGodot</title>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSt_abNRmzrY1n5M6xss1OgU3TWtcrN_HZvqvQLnfubsYDtdapTF6OikLuv&s=10');
            background-size: cover;
            background-position: center;
            font-family: 'Courier Prime', monospace;
            color: white;
        }

        /* TikTok Button (Top Right) */
        .tiktok-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            border: 2px solid white;
            color: white;
            text-decoration: none;
            font-size: 14px;
        }

        /* Responsive Buttons */
        .btn {
            padding: 15px 30px;
            font-size: clamp(1rem, 2.5vw, 1.5rem); /* Shrinks based on screen */
            background: transparent;
            border: 3px solid #E0F7FA;
            color: white;
            text-decoration: none;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            margin: 10px;
            display: inline-block;
            text-align: center;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px #E0F7FA;
        }

        /* Devlog Section */
        .devlog {
            margin-top: 30px;
            background: rgba(0, 0, 0, 0.6);
            padding: 20px;
            max-width: 80%;
        }
    </style>
</head>
<body>

    <a href="https://www.tiktok.com/@slgodot" class="tiktok-btn">TikTok</a>

    <a href="https://github.com/notrealtze/DEVslGodot/releases/latest/download/FNAF.sl.godot.apk" class="btn">
        Install FNAF sl godot.apk
    </a>

    <div class="devlog">
        <h2>DEVLOG 5</h2>
        <p>Added vents crawling thing.</p>
    </div>

</body>
</html>
